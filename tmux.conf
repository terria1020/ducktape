# ~/.tmux.conf

# 마우스 스크롤 활성화
set -g mouse on
set -g history-limit 100000

# 마우스 드래그 종료 시 macOS 클립보드로 즉시 복사
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ducktape
# F2: 현재 에이전트 세션 detach
bind-key -n F2 run-shell 'zsh -lc "source \"$HOME/.zsh/shell-agents-tmux.zsh\"; ducktape-tmux-f2"'

# F12: bind된 디렉토리 에이전트 세션 순환
bind-key -n F12 run-shell 'zsh -lc "source \"$HOME/.zsh/shell-agents-tmux.zsh\"; ducktape-tmux-f12"'

# Ctrl-B a: ducktape 세션 피커 (fzf 있으면 팝업, 없으면 내장 choose-session)
bind-key a run-shell \
  'if command -v fzf >/dev/null 2>&1; then \
     tmux display-popup -E "tmux ls 2>/dev/null | grep ducktape | cut -d: -f1 | fzf --prompt=\"agent> \" --height=10 | xargs -I{} tmux switch-client -t {}"; \
   else \
     tmux choose-session; \
   fi'
# /ducktape
