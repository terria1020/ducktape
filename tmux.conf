# ~/.tmux.conf

# 마우스 스크롤 활성화
set -g mouse on
set -g history-limit 100000

# 마우스 드래그 종료 시 macOS 클립보드로 즉시 복사
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ducktape
# F2: 에이전트 안에서 detach → 쉘 복귀
bind-key -n F2 detach-client

# F12: 현재 세션 에이전트 재시작 (컨텍스트 초기화, resume 없음)
bind-key -n F12 run-shell '\
  AGENT=$(cat "$HOME/.zsh/.ducktape-agent" 2>/dev/null || echo claude); \
  case "$AGENT" in cursor) AGENT="agent" ;; esac; \
  S=$(tmux display-message -p "#{session_name}"); \
  D=$(tmux display-message -p "#{pane_current_path}"); \
  TMP="tmp_restart_$$"; \
  tmux new-session -d -s "$TMP" -c "$D" "$AGENT"; \
  tmux switch-client -t "$TMP"; \
  tmux kill-session -t "$S"; \
  tmux rename-session -t "$TMP" "$S"'

# Ctrl-B a: ducktape 세션 피커 (fzf 있으면 팝업, 없으면 내장 choose-session)
bind-key a run-shell \
  'if command -v fzf >/dev/null 2>&1; then \
     tmux display-popup -E "tmux ls 2>/dev/null | grep ducktape | cut -d: -f1 | fzf --prompt=\"agent> \" --height=10 | xargs -I{} tmux switch-client -t {}"; \
   else \
     tmux choose-session; \
   fi'
# /ducktape
